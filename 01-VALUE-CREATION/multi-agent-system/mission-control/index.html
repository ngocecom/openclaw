<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Mission Control - OpenClaw</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #8b5cf6;
            --success: #10b981; --warning: #f59e0b; --error: #ef4444;
            --bg-dark: #0f172a; --bg-card: #1e293b; --bg-hover: #334155;
            --text-primary: #f1f5f9; --text-secondary: #94a3b8; --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }
        .header { background: rgba(30,41,59,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .header-left h1 { font-family: 'Press Start 2P', cursive; font-size: 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-subtitle { color: var(--text-secondary); font-size: 0.875rem; margin-top: 0.25rem; }
        .nav-tabs { display: flex; gap: 0.5rem; padding: 1rem 2rem; background: rgba(30,41,59,0.5); border-bottom: 1px solid var(--border); }
        .nav-tab { padding: 0.75rem 1.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text-secondary); cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .nav-tab:hover { background: var(--bg-hover); color: var(--text-primary); }
        .nav-tab.active { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border-color: var(--primary); }
        .main-content { padding: 2rem; max-width: 1600px; margin: 0 auto; }
        .screen { display: none; animation: fadeIn 0.5s; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #calendar { background: var(--bg-card); padding: 2rem; border-radius: 16px; border: 1px solid var(--border); }
        .fc-theme-standard .fc-scrollgrid { border-color: var(--border); }
        .fc-col-header-cell { background: rgba(255,255,255,0.05); padding: 1rem; }
        .fc-daygrid-day { background: rgba(255,255,255,0.02); }
        .fc-event { border: none; padding: 0.5rem; font-size: 0.875rem; cursor: pointer; border-radius: 4px; }
        .fc-event-researcher { background: rgba(239,68,68,0.8); }
        .fc-event-analyst { background: rgba(139,92,246,0.8); }
        .fc-event-assistant { background: rgba(16,185,129,0.8); }
        .fc-event-writer { background: rgba(245,158,11,0.8); }
        .fc-event-engineer { background: rgba(99,102,241,0.8); }
        .task-manager { margin-top: 2rem; background: var(--bg-card); padding: 2rem; border-radius: 16px; border: 1px solid var(--border); }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99,102,241,0.3); }
        .task-list { display: grid; gap: 1rem; }
        .task-item { background: var(--bg-hover); padding: 1rem; border-radius: 8px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .task-info h4 { margin-bottom: 0.25rem; }
        .task-meta { font-size: 0.875rem; color: var(--text-secondary); }
        .task-actions { display: flex; gap: 0.5rem; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
        .btn-edit { background: var(--warning); color: black; }
        .btn-delete { background: var(--error); color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); padding: 2rem; border-radius: 16px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-header h3 { font-size: 1.5rem; }
        .close-btn { background: none; border: none; color: var(--text-secondary); font-size: 1.5rem; cursor: pointer; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.75rem; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: inherit; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 768px) { .header { flex-direction: column; gap: 1rem; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1>🎮 Mission Control</h1>
            <div class="header-subtitle">OpenClaw Multi-Agent System</div>
        </div>
    </header>

    <nav class="nav-tabs">
        <button class="nav-tab" onclick="switchTab('team')">👥 Team</button>
        <button class="nav-tab active" onclick="switchTab('calendar')">📅 Calendar</button>
        <button class="nav-tab" onclick="switchTab('office')">🏢 Office</button>
        <button class="nav-tab" onclick="switchTab('settings')">⚙️ Settings</button>
    </nav>

    <main class="main-content">
        <div id="calendar-screen" class="screen active">
            <div class="task-manager">
                <div class="task-header">
                    <h2>📋 Task Management</h2>
                    <button class="btn btn-primary" onclick="openAddTaskModal()">+ Add New Task</button>
                </div>
                <div class="task-list" id="taskList"></div>
            </div>
            <div id="calendar" style="margin-top: 2rem;"></div>
        </div>
        <div id="team-screen" class="screen"><h2>👥 Team Screen</h2><p style="color: var(--text-secondary); margin-top: 1rem;">Coming soon</p></div>
        <div id="office-screen" class="screen"><h2>🏢 Office View</h2><p style="color: var(--text-secondary); margin-top: 1rem;">Coming soon</p></div>
        <div id="settings-screen" class="screen"><h2>⚙️ Settings</h2><p style="color: var(--text-secondary); margin-top: 1rem;">Coming soon</p></div>
    </main>

    <!-- Add/Edit Task Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Task</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <form id="taskForm" onsubmit="saveTask(event)">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label>Task Title *</label>
                    <input type="text" id="taskTitle" required placeholder="e.g., Daily News Digest">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Assign to Agent *</label>
                        <select id="taskAgent" required>
                            <option value="Researcher">📰 Researcher</option>
                            <option value="Analyst">📊 Analyst</option>
                            <option value="Assistant">🤝 Assistant</option>
                            <option value="Writer">📝 Writer</option>
                            <option value="Engineer">🔧 Engineer</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select id="taskPriority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Time *</label>
                        <input type="time" id="taskStart" required>
                    </div>
                    <div class="form-group">
                        <label>End Time *</label>
                        <input type="time" id="taskEnd" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Recurrence *</label>
                        <select id="taskRecurrence" onchange="toggleRecurrenceOptions()" required>
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="once">One-time</option>
                        </select>
                    </div>
                    <div class="form-group" id="dayOfWeekGroup" style="display:none;">
                        <label>Day of Week</label>
                        <select id="taskDayOfWeek">
                            <option value="Monday">Monday</option>
                            <option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option>
                            <option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                            <option value="Saturday">Saturday</option>
                            <option value="Sunday">Sunday</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="taskDescription" placeholder="Task details..."></textarea>
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let tasks = [];
        let calendar;

        // Load tasks from JSON file
        async function loadTasks() {
            try {
                const response = await fetch('tasks.json');
                const data = await response.json();
                tasks = data.tasks;
                renderTaskList();
                renderCalendar();
            } catch (error) {
                console.error('Error loading tasks:', error);
                tasks = [];
                renderTaskList();
                renderCalendar();
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
            document.getElementById(`${tabName}-screen`).classList.add('active');
            if (tabName === 'calendar') { loadTasks(); }
        }

        function renderTaskList() {
            const taskList = document.getElementById('taskList');
            if (tasks.length === 0) {
                taskList.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 2rem;">No tasks scheduled. Click "Add New Task" to create one!</p>';
                return;
            }
            taskList.innerHTML = tasks.map(task => `
                <div class="task-item" style="border-left-color: getAgentColor(task.agent)">
                    <div class="task-info">
                        <h4>${task.title}</h4>
                        <div class="task-meta">
                            ${getAgentIcon(task.agent)} ${task.agent} • ${task.start} - ${task.end} • ${task.recurrence}
                            ${task.recurrence === 'weekly' ? `(${task.dayOfWeek})` : ''}
                            ${task.recurrence === 'monthly' ? `(${task.dayOfMonth}${getDayOrdinal(task.dayOfMonth)})` : ''}
                            • <span style="color: ${getPriorityColor(task.priority)}">${task.priority.toUpperCase()}</span>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="btn btn-sm btn-edit" onclick="editTask('${task.id}')">Edit</button>
                        <button class="btn btn-sm btn-delete" onclick="deleteTask('${task.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function renderCalendar() {
            const calendarEl = document.getElementById('calendar');
            const events = tasks.map(task => {
                const today = new Date();
                let startDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                const [hours, minutes] = task.start.split(':');
                startDate.setHours(parseInt(hours), parseInt(minutes));
                
                let endDate = new Date(startDate);
                const [endHours, endMinutes] = task.end.split(':');
                endDate.setHours(parseInt(endHours), parseInt(endMinutes));

                return {
                    title: `${getAgentIcon(task.agent)} ${task.title}`,
                    start: startDate.toISOString(),
                    end: endDate.toISOString(),
                    className: `fc-event-${task.agent.toLowerCase()}`,
                    extendedProps: { task }
                };
            });

            if (calendar) { calendar.destroy(); }
            
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                events: events,
                editable: true,
                droppable: true,
                eventClick: function(info) {
                    const task = info.event.extendedProps.task;
                    editTask(task.id);
                }
            });
            calendar.render();
        }

        function getAgentIcon(agent) {
            const icons = { 'Researcher': '📰', 'Analyst': '📊', 'Assistant': '🤝', 'Writer': '📝', 'Engineer': '🔧' };
            return icons[agent] || '📋';
        }

        function getAgentColor(agent) {
            const colors = { 'Researcher': '#ef4444', 'Analyst': '#8b5cf6', 'Assistant': '#10b981', 'Writer': '#f59e0b', 'Engineer': '#6366f1' };
            return colors[agent] || '#6366f1';
        }

        function getPriorityColor(priority) {
            const colors = { 'low': '#10b981', 'medium': '#f59e0b', 'high': '#ef4444' };
            return colors[priority] || '#94a3b8';
        }

        function getDayOrdinal(day) {
            if (day > 3 && day < 21) return 'th';
            switch (day % 10) {
                case 1: return 'st';
                case 2: return 'nd';
                case 3: return 'rd';
                default: return 'th';
            }
        }

        function openAddTaskModal() {
            document.getElementById('modalTitle').textContent = 'Add New Task';
            document.getElementById('taskForm').reset();
            document.getElementById('taskId').value = '';
            document.getElementById('taskModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
        }

        function toggleRecurrenceOptions() {
            const recurrence = document.getElementById('taskRecurrence').value;
            document.getElementById('dayOfWeekGroup').style.display = recurrence === 'weekly' ? 'block' : 'none';
        }

        function editTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            document.getElementById('modalTitle').textContent = 'Edit Task';
            document.getElementById('taskId').value = task.id;
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskAgent').value = task.agent;
            document.getElementById('taskPriority').value = task.priority;
            document.getElementById('taskStart').value = task.start;
            document.getElementById('taskEnd').value = task.end;
            document.getElementById('taskRecurrence').value = task.recurrence;
            document.getElementById('taskDescription').value = task.description || '';
            
            if (task.recurrence === 'weekly') {
                document.getElementById('dayOfWeekGroup').style.display = 'block';
                document.getElementById('taskDayOfWeek').value = task.dayOfWeek || 'Monday';
            }
            
            document.getElementById('taskModal').classList.add('active');
        }

        function saveTask(event) {
            event.preventDefault();
            
            const taskId = document.getElementById('taskId').value || Date.now().toString();
            const task = {
                id: taskId,
                title: document.getElementById('taskTitle').value,
                agent: document.getElementById('taskAgent').value,
                priority: document.getElementById('taskPriority').value,
                start: document.getElementById('taskStart').value,
                end: document.getElementById('taskEnd').value,
                recurrence: document.getElementById('taskRecurrence').value,
                description: document.getElementById('taskDescription').value,
                status: 'active'
            };

            if (task.recurrence === 'weekly') {
                task.dayOfWeek = document.getElementById('taskDayOfWeek').value;
            }

            const existingIndex = tasks.findIndex(t => t.id === taskId);
            if (existingIndex >= 0) {
                tasks[existingIndex] = task;
            } else {
                tasks.push(task);
            }

            // Save to tasks.json (in production, this would be an API call)
            saveTasksToFile();
            renderTaskList();
            renderCalendar();
            closeModal();
        }

        function deleteTask(taskId) {
            if (!confirm('Are you sure you want to delete this task?')) return;
            tasks = tasks.filter(t => t.id !== taskId);
            saveTasksToFile();
            renderTaskList();
            renderCalendar();
        }

        function saveTasksToFile() {
            // In production, this would be an API call to save to server
            // For now, we'll just log the data
            console.log('Saving tasks:', JSON.stringify({ tasks }, null, 2));
            
            // Create download link for updated tasks.json
            const dataStr = JSON.stringify({ tasks }, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            console.log('Download updated tasks.json:', URL.createObjectURL(dataBlob));
            
            alert('Task saved! In production, this would update tasks.json automatically. For now, copy the console output to update tasks.json manually.');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadTasks);
    </script>
</body>
</html>
